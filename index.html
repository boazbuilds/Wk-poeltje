    Per duel: model-kansen, de keuze van de massa, en een positie-afhankelijke
    aanbeveling. Meesterzet (+2) wordt berekend op de echte <10%-grens.
    Positie:  Achterstand -> variantie (hoge-kans scores die de massa mist)
              Neutraal    -> EV (beste verwachte punten, gratis meesterzet mee)
              Voorsprong  -> spiegel de massa (variantie laag, voorsprong vast)  */

// ---------- math ----------
function poissonPmf(l, k) {
  const o = [Math.exp(-l)];
  for (let i = 1; i <= k; i++) o.push((o[i - 1] * l) / i);
  return o;
}
function scoreMatrix(lh, la, rho, k) {
  const ph = poissonPmf(lh, k), pa = poissonPmf(la, k), M = [];
  let s = 0;
  for (let h = 0; h <= k; h++) {
    M[h] = [];
    for (let a = 0; a <= k; a++) {
      let v = ph[h] * pa[a];
      if (h === 0 && a === 0) v *= 1 - lh * la * rho;
      else if (h === 0 && a === 1) v *= 1 + lh * rho;
      else if (h === 1 && a === 0) v *= 1 + la * rho;
      else if (h === 1 && a === 1) v *= 1 - rho;
      if (v < 0) v = 0;
      M[h][a] = v; s += v;
    }
  }
  for (let h = 0; h <= k; h++) for (let a = 0; a <= k; a++) M[h][a] /= s;
  return M;
}
function outcome(M) {
  let hw = 0, d = 0, aw = 0;
  for (let h = 0; h < M.length; h++) for (let a = 0; a < M.length; a++)
    h > a ? (hw += M[h][a]) : h === a ? (d += M[h][a]) : (aw += M[h][a]);
  return { hw, d, aw };
}
function pts(ph, pa, h, a) {
  let p = 0;
  if (Math.sign(ph - pa) === Math.sign(h - a)) p += 3;
  if (ph === h) p += 1;
  if (pa === a) p += 1;
  if (ph - pa === h - a) p += 1;
  return p;
}
const popOf = (h, a, crowd) => {
  for (const c of crowd) if (c[0] === h && c[1] === a) return c[2];
  return null; // niet in de populaire lijst => zeker onder 10%
};

function analyse(lh, la, crowd, rho) {
  const K = 8, P = 6;
  const M = scoreMatrix(lh, la, rho, K);
  const probs = outcome(M);
  let mode = { h: 0, a: 0, p: 0 };
  for (let h = 0; h <= 5; h++) for (let a = 0; a <= 5; a++) if (M[h][a] > mode.p) mode = { h, a, p: M[h][a] };

  const stat = (h, a) => {
    const mp = h <= 5 && a <= 5 ? M[h][a] : 0;
    const pop = popOf(h, a, crowd);
    const mz = pop === null || pop < 10;
    let ev = 0;
    for (let x = 0; x <= K; x++) for (let y = 0; y <= K; y++) ev += M[x][y] * pts(h, a, x, y);
    return { h, a, mp, pop, mz, ev, evz: ev + (mz ? 2 * mp : 0) };
  };

  let evpick = null, chase = null;
  for (let h = 0; h <= P; h++) for (let a = 0; a <= P; a++) {
    const s = stat(h, a);
    if (!evpick || s.evz > evpick.evz) evpick = s;
    if ((s.pop === null || s.pop <= 12) && (!chase || s.evz > chase.evz)) chase = s;
  }
  // mirror = drukste keuze van de massa
  let top = crowd.length ? crowd.reduce((b, c) => (c[2] > b[2] ? c : b)) : [mode.h, mode.a, 0];
  const mirror = stat(top[0], top[1]);
  return { M, probs, mode, evpick, chase, mirror, stat };
}

            <Chip title="Neutraal (EV)" s={a.evpick} accent={C.ink} />
            <Chip title="Achterstand" s={a.chase} accent={C.away} />
            <Chip title="Voorsprong (massa)" s={a.mirror} accent={C.muted} />
          </div>
          <Heat M={a.M} rec={rec} mine={mine} />
          <div style={{ marginTop: 11, display: "flex", flexWrap: "wrap", gap: 12, alignItems: "flex-end" }}>
            {[["λ thuis", m.lh, (v) => onChange({ ...m, lh: v })], ["λ uit", m.la, (v) => onChange({ ...m, la: v })]].map((f, i) => (
              <label key={i} className="font-mono" style={{ fontSize: 11, color: C.muted }}>{f[0]}<br />
                <input type="number" step="0.05" value={f[1].toFixed(2)} onChange={(e) => f[2](Math.max(0, parseFloat(e.target.value) || 0))}
                  style={{ width: 66, marginTop: 3, padding: "4px 6px", border: `1px solid ${C.line}`, borderRadius: 6, fontFamily: "inherit" }} /></label>
            ))}
            <div style={{ width: 1, alignSelf: "stretch", background: C.line }} />
            <label className="font-mono" style={{ fontSize: 11, color: C.muted }}>Totaal<br />
              <input type="number" step="0.05" value={t} onChange={(e) => setT(e.target.value)} style={{ width: 66, marginTop: 3, padding: "4px 6px", border: `1px solid ${C.line}`, borderRadius: 6, fontFamily: "inherit" }} /></label>
            <label className="font-mono" style={{ fontSize: 11, color: C.muted }}>Supremacy<br />
              <input type="number" step="0.05" value={s} onChange={(e) => setS(e.target.value)} style={{ width: 66, marginTop: 3, padding: "4px 6px", border: `1px solid ${C.line}`, borderRadius: 6, fontFamily: "inherit" }} /></label>
            <button onClick={() => { const T = parseFloat(t), S = parseFloat(s); if (!isNaN(T) && !isNaN(S)) onChange({ ...m, lh: Math.max(0, (T + S) / 2), la: Math.max(0, (T - S) / 2) }); }}
              className="font-mono" style={{ fontSize: 12, padding: "7px 11px", background: C.ink, color: C.paper, border: "none", borderRadius: 6, cursor: "pointer" }}>→ λ</button>
          </div>
          <div className="font-mono" style={{ fontSize: 10, color: C.muted, marginTop: 7 }}>Totaal = O/U-lijn, Supremacy = Aziatische handicap (Pinnacle/Betfair, marge eruit).</div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [matches, setMatches] = useState(SEED);
  const [round, setRound] = useState(1);
  const [position, setPosition] = useState("neutral");
  const rm = matches.filter((m) => m.round === round);

  const analyses = useMemo(() => {
    const map = {};
    rm.forEach((m) => (map[m.id] = analyse(m.lh, m.la, m.crowd, RHO)));
    return map;
  }, [matches, round]);

  const boosters = useMemo(() =>
    rm.map((m) => ({ id: m.id, ev: recOf(analyses[m.id], position).evz })).sort((x, y) => y.ev - x.ev).slice(0, 1).map((x) => x.id),
    [analyses, position, round]);

  const changes = rm.filter((m) => { const r = recOf(analyses[m.id], position); return r.h !== m.mine[0] || r.a !== m.mine[1]; }).length;

  const update = (nm) => setMatches((p) => p.map((m) => (m.id === nm.id ? nm : m)));
  const groups = [...new Set(rm.map((m) => m.group))];

  return (
    <div style={{ background: C.paper, minHeight: "100vh", color: C.ink, fontFamily: "ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" }}>
      <div style={{ maxWidth: 760, margin: "0 auto", padding: "26px 16px 60px" }}>
        <div className="font-mono" style={{ fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: C.home }}>ESPN WK Pool · model v10 · 3 scherpe bronnen (Pinnacle+Polymarket+Bovada) · 21 jun 2026, 18:38 </div>
        <h1 style={{ fontSize: 28, fontWeight: 700, letterSpacing: -0.5, margin: "6px 0 12px" }}>Speelronde {round}</h1>

        <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
          {[1, 2, 3].map((r) => (
            <button key={r} onClick={() => setRound(r)} className="font-mono" style={{ flex: 1, padding: "9px 0", fontSize: 13, cursor: "pointer", borderRadius: 8, border: `1px solid ${round === r ? C.ink : C.line}`, background: round === r ? C.ink : C.panel, color: round === r ? C.paper : C.muted }}>Ronde {r}</button>
          ))}
        </div>

        <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
          {Object.keys(POS).map((k) => (
            <button key={k} onClick={() => setPosition(k)} className="font-mono" style={{ flex: 1, padding: "7px 0", fontSize: 12, cursor: "pointer", borderRadius: 8, border: `1px solid ${position === k ? C.home : C.line}`, background: position === k ? C.home : C.panel, color: position === k ? C.paper : C.muted }}>{POS[k].label}</button>
          ))}
        </div>

        <div style={{ background: "#EEF2EF", border: `1px solid ${C.line}`, borderRadius: 10, padding: "10px 12px", fontSize: 12.5, color: C.muted, lineHeight: 1.5 }}>
          <strong style={{ color: C.ink }}>{POS[position].label}:</strong> {POS[position].tip}. De aanbeveling per duel volgt deze stand. Kaders met een <span style={{ color: C.flag }}>oranje rand</span> wijken af van wat je nu hebt ingevuld: <strong style={{ color: C.ink }}>{changes} van {rm.length}</strong>. Oranje ★ bij een score = onder 10% in de poule (meesterzet, +2). Eén <strong style={{ color: C.ink }}>2× booster</strong> per ronde: zet hem op het gemarkeerde duel (hoogste verwachte punten).
        </div>

        <div style={{ marginTop: 20 }}>
          {groups.map((g) => (
            <div key={g} style={{ display: "flex", gap: 12, marginBottom: 16 }}>
              <div className="font-mono" style={{ fontSize: 36, fontWeight: 700, color: C.line, lineHeight: 1, width: 38, flexShrink: 0 }}>{g}</div>
              <div style={{ flex: 1 }}>
                {rm.filter((m) => m.group === g).map((m) => <Card key={m.id} m={m} onChange={update} position={position} booster={boosters.includes(m.id)} />)}
              </div>
            </div>
          ))}
        </div>

        <div className="font-mono" style={{ fontSize: 10.5, color: C.muted, lineHeight: 1.6, borderTop: `1px solid ${C.line}`, paddingTop: 14 }}>
          Alle 72 groepsduels staan op een joint-kalibratie van drie live marktbronnen (gekalibreerd 21 jun 2026, 18:38): Pinnacle (scherpste book, dubbel gewicht, volledige totals- en spread-ladders), Polymarket (echt ingelegd geld) en Bovada. Per duel worden de 1X2, de O/U-totaallijnen (verwacht aantal goals) en de goal spreads (supremacy) tegelijk gefit; ρ=-0.04 op dezelfde doelfunctie. Populariteit en je eigen voorspelling komen rechtstreeks uit de poule, dus meesterzet en massa-keuze zijn exact. Ronde 2 en 3 worden vlak voor hun deadlines opnieuw geijkt; ronde-3 'dode' duels kun je bijsturen via analysis/overrides.json. Iedereen staat op nul, dus speel ronde 1 op Neutraal.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
